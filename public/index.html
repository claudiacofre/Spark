<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Spark - Enciende la conversación</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>✨ Spark</h1>

      <div class="publish-box">
        <textarea
          id="sparkContent"
          placeholder="¿Qué está pasando?"
          maxlength="280"
        ></textarea>
        <button id="btnPublish">Chispa!</button>
      </div>

      <hr />

      <div id="feed">
        <p>Cargando chispas...</p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
